<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | SkillUp</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">SU</div>
            <span class="brand-title">SkillUp</span>
          </a>
          <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="requests.html">Requests</a>
            <a href="messages.html">Messages</a>
            <a href="profile.html">Profile</a>
            <a href="community.html">Community</a>
            <a href="login.html" class="nav-auth">Login</a>
            <a href="register.html" class="nav-auth">Register</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode">🌙</button>
          </nav>
        </div>
      </header>

      <main class="profile-layout">
        <div class="container">
          <section class="profile-card">
            <div class="profile-header">
              <h1>My Profile</h1>
              <p>Keep your details up to date and list your skills.</p>
            </div>

            <div class="profile-grid">
              <div class="field">
                <label for="fullName">Full name</label>
                <input
                  class="input"
                  id="fullName"
                  type="text"
                  placeholder="e.g. Aditi Sharma"
                />
              </div>
              <div class="field">
                <label for="location">College</label>
                <input
                  class="input"
                  id="location"
                  type="text"
                  placeholder="Enter your college name"
                />
              </div>
            </div>

            <div class="skill-section">
              <h2>Skills I can teach</h2>
              <div class="input-row">
                <input
                  class="input"
                  id="teachSkillInput"
                  type="text"
                  placeholder="Skill name"
                />
                <button class="add-skill-btn" type="button" id="addTeach">
                  <span class="add-icon" aria-hidden="true">+</span>
                  Add Skill
                </button>
              </div>
              <div class="tag-list" id="teachTags"></div>
            </div>

            <div class="skill-section">
              <h2>Skills I want to learn</h2>
              <div class="input-row learn">
                <input
                  class="input"
                  id="learnSkillInput"
                  type="text"
                  placeholder="Skill name"
                />
                <button class="add-skill-btn" type="button" id="addLearn">
                  <span class="add-icon" aria-hidden="true">+</span>
                  Add Skill
                </button>
              </div>
              <div class="tag-list" id="learnTags"></div>
            </div>

            <div class="save-row">
              <button class="btn btn-primary" type="button" id="saveProfile">
                Save profile
              </button>
              <span class="status" id="saveStatus">Profile saved.</span>
            </div>
          </section>
        </div>
      </main>

      <footer class="footer">
        <p>© 2026 SkillUp. All rights reserved.</p>
      </footer>
    </div>

    <script src="app.js"></script>
    <script src="profile.js"></script>
  </body>
</html>
