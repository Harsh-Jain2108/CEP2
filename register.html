<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | SkillUp</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body data-form="register">
    <div class="page">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">SU</div>
            <span class="brand-title">SkillUp</span>
          </a>
          <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="login.html" class="nav-auth">Login</a>
            <a href="register.html" class="nav-auth">Register</a>
            <a href="profile.html">Profile</a>
            <a href="skills.html">Skills</a>
            <a href="requests.html">Requests</a>
            <a href="messages.html">Messages</a>
            <a href="community.html">Community</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode">Dark</button>
          </nav>
        </div>
      </header>

      <main class="auth-wrapper">
        <section class="auth-card">
          <h1 class="auth-title">Create your account</h1>
          <p class="auth-subtitle">Join a community of learners and mentors.</p>

          <form>
            <div class="form-grid">
              <div class="field">
                <label for="fullName">Full name</label>
                <input
                  class="input"
                  type="text"
                  id="fullName"
                  placeholder="Enter your full name"
                  required
                />
              </div>

              <div class="field">
                <label for="registerEmail">Email</label>
                <input
                  class="input"
                  type="email"
                  id="registerEmail"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field">
                <label for="registerPassword">Password</label>
                <div class="password-field">
                  <input
                    class="input"
                    type="password"
                    id="registerPassword"
                    placeholder="Create a password"
                    required
                  />
                  <button
                    class="password-toggle"
                    type="button"
                    data-target="registerPassword"
                    aria-label="Toggle password visibility"
                  ></button>
                </div>
              </div>
            </div>

            <div class="auth-actions">
              <button class="btn btn-primary" type="submit">Register</button>
              <div class="alert" role="status" aria-live="polite"></div>
            </div>
          </form>

          <div class="divider">or continue with</div>
          <button class="google-btn" type="button">Sign up with Google</button>

          <p class="switch-text">
            Already have an account? <a href="login.html" class="nav-auth">Login here</a>
          </p>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container">
          <p>SkillUp is community-driven and always free.</p>
        </div>
      </footer>
    </div>

    <script src="app.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
