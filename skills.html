<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills | SkillUp</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="skills.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="index.html">
            <div class="brand-mark">SU</div>
            <span class="brand-title">SkillUp</span>
          </a>
          <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="requests.html">Requests</a>
            <a href="messages.html">Messages</a>
            <a href="profile.html">Profile</a>
            <a href="community.html">Community</a>
            <a href="login.html" class="nav-auth">Login</a>
            <a href="register.html" class="nav-auth">Register</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode">🌙</button>
          </nav>
        </div>
      </header>

      <main>
        <section class="skills-hero">
          <div class="container">
            <h1>Browse available skills</h1>
            <p class="section-lede">
              Search by skill to find the right mentor or
              learning circle.
            </p>

            <div class="filters">
              <div class="skill-search" id="skillSearchBox">
                <button
                  class="search-toggle"
                  id="skillSearchToggle"
                  type="button"
                  aria-label="Search skills"
                >
                  <span aria-hidden="true">&#128269;</span>
                </button>
                <input
                  class="input skill-search-input"
                  id="searchInput"
                  type="text"
                  placeholder=""
                  autocomplete="off"
                />
                <div class="search-suggestions" id="searchSuggestions"></div>
              </div>
            </div>

            <div class="popular-skills" id="popularSkillsSection">
              <div class="popular-skills-head">
                <h2>Popular Skills</h2>
              </div>
              <div class="popular-skills-list" id="popularSkillsList"></div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="skill-grid" id="skillGrid"></div>
            <div class="empty-state" id="emptyState">
              <p class="empty-state-main">Search a skill to find teachers who can help you learn.</p>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>© 2026 SkillUp. All rights reserved.</p>
      </footer>
    </div>

    <script src="app.js"></script>
    <script src="skills.js"></script>
  </body>
</html>
